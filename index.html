<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text to Image Tool</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <header>
            <h1>Text to Image Tool</h1>
            <button id="themeToggle" class="theme-toggle" aria-label="Toggle theme">
                <span class="icon">🌙</span>
            </button>
        </header>

        <div class="main-grid">
            <div class="left-panel">
                <div class="input-section">
                    <label for="textInput">Enter text:</label>
                    <textarea id="textInput" placeholder="Type your text here..." rows="6"></textarea>
                </div>

                <div class="formatting-section">
                    <h3>Format Options</h3>

                    <div class="format-group">
                        <label for="fontFamily">Font:</label>
                        <select id="fontFamily">
                            <optgroup label="Song / Serif">
                                <option value="SimSun, 宋体">SimSun（宋体）</option>
                                <option value="NSimSun, 新宋体">NSimSun（新宋体）</option>
                                <option value="STSong, 华文宋体">STSong（华文宋体）</option>
                                <option value="STZhongsong, 华文中宋">STZhongsong（华文中宋）</option>
                                <option value="PMingLiU, 新細明體">PMingLiU（新細明體）</option>
                                <option value="MingLiU, 細明體">MingLiU（細明體）</option>
                                <option value="Source Han Serif SC, 思源宋体">Source Han Serif SC</option>
                                <option value="Noto Serif SC">Noto Serif SC</option>
                            </optgroup>
                            <optgroup label="Hei / Sans-Serif">
                                <option value="SimHei, 黑体">SimHei（黑体）</option>
                                <option value="Microsoft YaHei, 微软雅黑" selected>Microsoft YaHei（微软雅黑）</option>
                                <option value="Microsoft JhengHei, 微軟正黑體">Microsoft JhengHei（微軟正黑體）</option>
                                <option value="STHeiti, 华文黑体">STHeiti（华文黑体）</option>
                                <option value="STXihei, 华文细黑">STXihei（华文细黑）</option>
                                <option value="PingFang SC">PingFang SC</option>
                                <option value="PingFang TC">PingFang TC</option>
                                <option value="Source Han Sans SC, 思源黑体">Source Han Sans SC</option>
                                <option value="Noto Sans SC">Noto Sans SC</option>
                            </optgroup>
                            <optgroup label="Kai / Calligraphic">
                                <option value="KaiTi, 楷体">KaiTi（楷体）</option>
                                <option value="STKaiti, 华文楷体">STKaiti（华文楷体）</option>
                                <option value="DFKai-SB, 標楷體">DFKai-SB（標楷體）</option>
                                <option value="STXingkai, 华文行楷">STXingkai（华文行楷）</option>
                            </optgroup>
                            <optgroup label="FangSong / Transitional">
                                <option value="FangSong, 仿宋">FangSong（仿宋）</option>
                                <option value="STFangsong, 华文仿宋">STFangsong（华文仿宋）</option>
                            </optgroup>
                            <optgroup label="Li Shu / Decorative">
                                <option value="LiSu, 隶书">LiSu（隶书）</option>
                                <option value="STLiti, 华文隶书">STLiti（华文隶书）</option>
                                <option value="STCaiyun, 华文彩云">STCaiyun（华文彩云）</option>
                                <option value="STHupo, 华文琥珀">STHupo（华文琥珀）</option>
                                <option value="FZShuTi, 方正舒体">FZShuTi（方正舒体）</option>
                                <option value="FZYaoti, 方正姚体">FZYaoti（方正姚体）</option>
                            </optgroup>
                            <optgroup label="Round / Other">
                                <option value="YouYuan, 幼圆">YouYuan（幼圆）</option>
                                <option value="Source Han Serif TC, 思源宋體">Source Han Serif TC</option>
                                <option value="Noto Serif TC">Noto Serif TC</option>
                                <option value="Noto Sans TC">Noto Sans TC</option>
                            </optgroup>
                        </select>
                    </div>

                    <div class="format-row">
                        <div class="format-group">
                            <label for="fontSize">Font Size (px):</label>
                            <input type="number" id="fontSize" value="480" min="12" max="3200">
                        </div>
                        <div class="format-group">
                            <label for="textAlign">Horizontal Align:</label>
                            <select id="textAlign">
                                <option value="left">Left</option>
                                <option value="center" selected>Center</option>
                                <option value="right">Right</option>
                            </select>
                        </div>
                    </div>

                    <div class="format-row">
                        <div class="format-group">
                            <label for="verticalAlign">Vertical Align:</label>
                            <select id="verticalAlign">
                                <option value="top">Top</option>
                                <option value="center" selected>Center</option>
                                <option value="bottom">Bottom</option>
                            </select>
                        </div>
                        <div class="format-group">
                            <label for="resolution">PNG Resolution:</label>
                            <select id="resolution">
                                <option value="1920x1080">1K (1920×1080)</option>
                                <option value="2560x1440">2K (2560×1440)</option>
                                <option value="3840x2160" selected>4K (3840×2160)</option>
                                <option value="7680x4320">8K (7680×4320)</option>
                            </select>
                        </div>
                    </div>

                    <div class="format-row">
                        <div class="format-group">
                            <label for="textColor">Text Color:</label>
                            <input type="color" id="textColor" value="#000000">
                        </div>
                        <div class="format-group">
                            <label for="bgColor">Background Color:</label>
                            <input type="color" id="bgColor" value="#ffffff">
                        </div>
                    </div>

                    <div class="style-buttons">
                        <button id="boldBtn" class="style-btn" title="Bold"><strong>B</strong></button>
                        <button id="italicBtn" class="style-btn" title="Italic"><em>I</em></button>
                        <button id="underlineBtn" class="style-btn" title="Underline"><u>U</u></button>
                    </div>

                    <div class="resolution-hint" id="resolutionHint"></div>
                </div>

                <div class="download-section">
                    <button id="downloadSVG" class="download-btn svg-btn">
                        <span>📄</span> Download SVG
                    </button>
                    <button id="downloadPNG" class="download-btn png-btn">
                        <span>🖼️</span> Download PNG
                    </button>
                </div>
            </div>

            <div class="right-panel">
                <div class="preview-section">
                    <h3>Live Preview</h3>
                    <div id="preview" class="preview-box"></div>
                </div>
            </div>
        </div>
    </div>

    <div id="notification" class="notification"></div>

    <script src="script.js"></script>
</body>

</html>
